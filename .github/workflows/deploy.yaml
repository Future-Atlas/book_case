name: Deploy Flutter Web to Vercel

on:
    push:
        branches:
            - main # mainブランチにPushされたら自動起動

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            # 1. コードのチェックアウト
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Flutterの道具箱をセットアップ（GitHubの超強力サーバーを使用）
            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable" # 💡バージョン指定を外し、常に最新の安定版（stable）を使うようにします
                  cache: true

            # 3. パッケージのダウンロード
            - name: Install dependencies
              run: flutter pub get

            # 4. Webアプリの組み立て（末尾に RAKUTEN_ACCESS_KEY を追加）
            - name: Build Flutter Web
              run: flutter build web --release --dart-define=FLUTTER_WEB_RENDERER=html --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} --dart-define=RAKUTEN_APP_ID=${{ secrets.RAKUTEN_APP_ID }} --dart-define=RAKUTEN_ACCESS_KEY=${{ secrets.RAKUTEN_ACCESS_KEY }}

            # 5. Vercelのツールをインストール
            - name: Install Vercel CLI
              run: npm install --global vercel

            # 6. Vercelのプロジェクト設定を取得
            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            # 7. Vercel BuildでFunctions/rewrites込みの成果物を作成
            - name: Build Vercel Prebuilt Output
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            # 8. prebuilt成果物を本番デプロイ
            - name: Deploy to Vercel
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
