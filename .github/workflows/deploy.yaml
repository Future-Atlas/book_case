name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main # mainブランチにPushされたら自動起動

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Flutterの道具箱をセットアップ（GitHubの超強力サーバーを使用）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # 使用しているバージョンに合わせて調整
          channel: 'stable'
          cache: true

      # 3. パッケージのダウンロード
      - name: Install dependencies
        run: flutter pub get

      # 4. Webアプリの組み立て（GitHub側なのでメモリ制限なし！）
      - name: Build Web
        run: flutter build web --release --web-renderer html --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      # 5. Vercelのツールをインストール
      - name: Install Vercel CLI
        run: npm install --global vercel

      # 6. 完成品（build/web）だけをVercelに直接送りつけて公開！
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}